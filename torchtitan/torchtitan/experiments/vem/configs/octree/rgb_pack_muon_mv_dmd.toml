[job]
dump_folder = "./outputs/octree_diff_mv"
description = "octree diffusion model with multiview conditioning"
print_args = true

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 10
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = true
save_tb_folder = "tb"
enable_wandb = true

[model]
name = "dmd_octdiff"
flavor = "grid512-5B-mv"

[optimizer]
name = "Muon"
lr = 1e-5
weight_decay = 0.01
betas = [0.9, 0.99]

mu = 0.99                     # Momentum factor for Muon
algorithm = "muon"           # Main algorithm to use for 2D matrices
nesterov = false             # Whether to use Nesterov momentum
adjust_lr = "rms_norm"  # How to adjust LR: "spectral_norm", "rms_norm", or null
flatten = false              # Whether to flatten 3D+ tensors to 2D
use_triton = true           # Whether to use Triton kernel for Newton-Schulz

# Parameter-specific optimizer selection
scalar_optimizer = "adamw"        # For 1D parameters (biases, layer norms)
embedding_optimizer = "adamw"     # For embedding layers
head_optimizer = "adamw"          # For model head/output layers
routing_optimizer = "adamw"       # For routing layers (DeepSeek MoE)
head_lr_scaling = true            # Apply 1/sqrt(dim) scaling to head layers
expert_optimizer = "adamw"        # All expert weights will use AdamW

# Learning rate scaling factors
scalar_lr_factor = 1.0            # LR multiplier for scalar parameters
embedding_lr_factor = 1.0         # LR multiplier for embedding parameters
head_lr_factor = 1.0              # LR multiplier for head parameters (after head_lr_scaling)
routing_lr_factor = 1.0           # LR multiplier for routing parameters

[lr_scheduler]
warmup_steps = 0 
decay_ratio = 0.0  # no decay, stay stable during training

[training]
batch_size = 4
max_norm = 1.0
steps = 100000
dataset = "vertex-rgb-pack"
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "float32"
compile = true
seed = 42
num_workers = 15
pin_memory = true
drop_last = false
fsdp_cast_forward_inputs = false
image_encoder_type = "dinov3"
image_encoder_model = "/mnt/pfs/share/pretrained_model/DINOv3/dinov3-vith16plus-pretrain-lvd1689m"
loss_type = "xpred-vloss"

[training.dataset_kwargs]
batches_packed = '/mnt/pfs/users/liuyingtian/NEXUS/torchtitan/.cache/data_list/pack/v24_11k_f48_20k_oct_nv_ffd.json.gz'
repeats = 1
shuffle_seed = 42
use_bos = true
use_cos = false
bos_bucket = "mesh-data-resave-ply-flip-normal"
image_bucket = "mesh-data-shapediff-render"
grid_size = 512
max_depth = 9
yup_to_zup = false
cache_instances = false
infinite = true
image_resolution = 512  # DINOv3 uses 512x512
drop_image_rate = 0.0   # 10% probability to drop images (for CFG)
alignment = 'near_align'
# Multiview conditioning
mv_uuids_json = '/path/to/mv_uuids.json'   # path to JSON list of UUIDs with mv renders
mv_bucket = 'mesh-data-shapediff-render-mv'
mv_prob = 0.5                               # probability of using mv renders for eligible UUIDs
mv_num_views_probs = [0.2, 0.4, 0.4]       # P(2 views), P(3 views), P(4 views)

[scheduler]
t_sampling_scheme = "logit_normal"
logit_mean = 0.0
logit_std = 1.0
uniform_ratio = 0.0
uniform_power = 1.0
uniform_min = 0.0
uniform_max = 1.0
num_train_timesteps = 1000
noise_std = 1.0
cfg_drop_prob = 0.1

[distill]
guidance_scale = 9.0
student_update_freq = 4
student_cfg_steps = 0  # CFG distill for first N steps (every iter), 0 = disabled
student_sample_steps = 4  # 1 = single-step, >1 = multi-step distillation
student_t_shift = 1.0  # timestep shift factor, 1.0 = no shift

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
context_parallel_degree = 1
enable_compiled_autograd = true

[experimental]
custom_args_module = "torchtitan.experiments.vem.extra_args_octdiff"

[checkpoint]
enable_checkpoint = true
folder = "ckpts"
interval = 1000
model_weights_only = false
keep_latest_k = 3
load_step = -1

[activation_checkpoint]
mode = "none"
selective_ac_option = "op"

[memory_estimation]
enabled = false

[ema]
enabled = true
beta = 0.9999
update_after_step = 0 
update_every = 1
inv_gamma = 1.0
power = 1.0
min_value = 0.0
