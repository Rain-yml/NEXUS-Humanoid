[job]
dump_folder = "./outputs/vem2"
description = "vem vdit model"
print_args = true

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 10
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = true
save_tb_folder = "tb"
enable_wandb = true 

[model]
name = "smgen_quad"
flavor = "default-image"

[optimizer]
name = "Muon"
lr = 1e-4
weight_decay = 0.01
betas = [0.9, 0.999]

mu = 0.999                     # Momentum factor for Muon
algorithm = "muon"           # Main algorithm to use for 2D matrices
nesterov = false             # Whether to use Nesterov momentum
adjust_lr = "rms_norm"  # How to adjust LR: "spectral_norm", "rms_norm", or null
flatten = false              # Whether to flatten 3D+ tensors to 2D
use_triton = true           # Whether to use Triton kernel for Newton-Schulz

# Parameter-specific optimizer selection
scalar_optimizer = "adamw"        # For 1D parameters (biases, layer norms)
embedding_optimizer = "adamw"     # For embedding layers
head_optimizer = "adamw"          # For model head/output layers
routing_optimizer = "adamw"       # For routing layers (DeepSeek MoE)
head_lr_scaling = true            # Apply 1/sqrt(dim) scaling to head layers
expert_optimizer = "adamw"        # All expert weights will use AdamW

# Learning rate scaling factors
scalar_lr_factor = 1.0            # LR multiplier for scalar parameters
embedding_lr_factor = 1.0         # LR multiplier for embedding parameters
head_lr_factor = 1.0              # LR multiplier for head parameters (after head_lr_scaling)
routing_lr_factor = 1.0           # LR multiplier for routing parameters

[lr_scheduler]
warmup_steps = 5000 # warmup steps
decay_ratio = 0.0  # no decay, stay stable during training

[training]
batch_size = 8
max_norm = 1.0  # grad norm clipping
steps = 100000
dataset = "smgen-rgb-quad-pack"
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "float32"
compile = true
seed = 42
num_workers = 15
pin_memory = true
drop_last = false
fsdp_cast_forward_inputs = false
encoder_flavor = ""
encoder_pretrain_path = "xxxx"
mean_std_path = "xxxx"
image_encoder_type = "dinov2"
image_encoder_model = "facebook/dinov2-with-registers-large"
image_encoder_return_the_nth_hidden_states = -1

[training.dataset_kwargs]
metadata_parquet = 'xxx'
batches_packed = 'xxx'
repeats = 1
shuffle_seed = 42
yup_to_zup = false
vertex_noise = 0.0
vertex_resolution = -1
vertex_position_type = 'float'
encoder_vertex_position_type = 'int'
extra_feat = 'none'
mode = 'tri_connect'
image_resolution = 518
drop_image_rate = 0.1
alignment = 'none'
infinite = true
symmetry_condition = false
symmetry_drop_rate = 0.0
quad_ratio_uncond_rate = 0.0

[scheduler]
t_sampling_scheme = "logit_normal"
logit_mean = 0.0
logit_std = 1.0
uniform_ratio = 0.0
uniform_power = 1.0
uniform_min = 0.0
uniform_max = 1.0
num_train_timesteps = 1000
noise_std = 1.0
dynamic_shift = false
shift_base = 256

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
context_parallel_degree = 1
enable_compiled_autograd = true

[experimental]
custom_args_module = "torchtitan.experiments.vem.extra_args_smgen"

[checkpoint]
enable_checkpoint = true
folder = "ckpts"
interval = 2000
model_weights_only = false
keep_latest_k = 2 # keep all checkpoints
load_step = -1 # automatic loading

[activation_checkpoint]
mode = "none"
# mode = "selective"  # ["none", "selective", "full"]
selective_ac_option = 3  # "int" = ac every positive int layer or 'op', ac based on ops policy

[memory_estimation]
enabled = false

[ema]
enabled = false
beta = 0.9999
update_after_step = 100
update_every = 10
inv_gamma = 1.0
power = 1.0
min_value = 0.0