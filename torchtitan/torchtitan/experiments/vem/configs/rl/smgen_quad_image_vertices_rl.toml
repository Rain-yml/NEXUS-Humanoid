[job]
dump_folder = "./outputs/vem_rl"
description = "vem smgen quad rl from image-vertices stage1 outputs"
print_args = true

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 10
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = true
save_tb_folder = "tb"
enable_wandb = true

[model]
name = "smgen_quad"
flavor = "default-image"

[optimizer]
name = "Muon"
lr = 1e-4
weight_decay = 0.01
betas = [0.9, 0.999]

mu = 0.999
algorithm = "muon"
nesterov = false
adjust_lr = "rms_norm"
flatten = false
use_triton = true

scalar_optimizer = "adamw"
embedding_optimizer = "adamw"
head_optimizer = "adamw"
routing_optimizer = "adamw"
head_lr_scaling = true
expert_optimizer = "adamw"

scalar_lr_factor = 1.0
embedding_lr_factor = 1.0
head_lr_factor = 1.0
routing_lr_factor = 1.0

[lr_scheduler]
warmup_steps = 5000
decay_ratio = 0.0

[training]
batch_size = 8
max_norm = 1.0
steps = 100000
dataset = "image-vertices-rl"
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "float32"
compile = true
seed = 42
num_workers = 15
pin_memory = true
drop_last = false
fsdp_cast_forward_inputs = false
encoder_flavor = "base-decoder-16-face0.6-ab-orient-12-kl-zerorope-nobias-res2048"
encoder_pretrain_path = "xxxx"
mean_std_path = "xxxx"
image_encoder_type = "dinov2"
image_encoder_model = "facebook/dinov2-with-registers-large"
image_encoder_return_the_nth_hidden_states = -1

[training.dataset_kwargs]
data_json = "/mnt/pfs/users/liuyingtian/NEXUS/torchtitan/.scripts/outputs/inference_i2v_for_rl/1_4B_bs128_img512_qr/step-254000_ema1True_sch1_euler_quad0.9/data.json"
repeats = 1
shuffle_seed = 42
image_resolution = 512
infinite = true

[scheduler]
t_sampling_scheme = "logit_normal"
logit_mean = 0.0
logit_std = 1.0
uniform_ratio = 0.0
uniform_power = 1.0
uniform_min = 0.0
uniform_max = 1.0
num_train_timesteps = 1000
noise_std = 1.0
dynamic_shift = false
shift_base = 256

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
context_parallel_degree = 1
enable_compiled_autograd = true

[experimental]
custom_args_module = "torchtitan.experiments.vem.extra_args_smgen"

[rl]
enabled = true
pretrained_path = ""
num_rollout_steps = 8
num_samples_per_input = 1
num_batches_per_epoch = 1
num_inner_epochs = 1
sampler_type = "euler"
scheduler_shift = 1.0
sampler_eta = 0.0
save_rollout_interval = 0

beta = 1.0
adv_clip_max = 5.0
kl_coeff = 0.0
use_per_input_advantage_norm = true

reward_name = "quad_ratio"
reward_workers = 4
reward_min_loop_len = 2

quad_decoder_mode = "tri_connect"

lora_rank = 32
lora_alpha = 64
lora_dropout = 0.0
lora_target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]
lora_path = ""
lora_ema_enabled = true
lora_ema_beta = 0.9999
lora_ema_update_after_step = 0
lora_ema_update_every = 1

old_policy_decay_type = "constant"
old_policy_decay = 0.0
old_policy_update_every = 1

[checkpoint]
enable_checkpoint = true
folder = "ckpts"
interval = 2000
model_weights_only = false
keep_latest_k = 2
load_step = -1

[activation_checkpoint]
mode = "none"
selective_ac_option = 3

[memory_estimation]
enabled = false

[ema]
enabled = false
beta = 0.9999
update_after_step = 100
update_every = 10
inv_gamma = 1.0
power = 1.0
min_value = 0.0
